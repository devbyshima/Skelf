name: Cut Release

# One-click releasing, PR-based. Run this (Actions → Cut Release → Run workflow), pick the bump,
# and it opens a "Release X.Y.Z" PR that bumps build.sh and promotes the CHANGELOG's
# "## [Unreleased]" section. MERGING that PR fires release.yml, which tags vX.Y.Z and builds &
# publishes the GitHub Release. Nothing is pushed straight to main — review happens in the PR.
#
# Normal flow: land changes (accumulating notes under "## [Unreleased]" in CHANGELOG.md), run
# this when you want to ship, review the PR, merge it.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Semantic-version bump'
        required: true
        type: choice
        options: [patch, minor, major]
        default: minor

permissions:
  contents: write        # push the release branch
  pull-requests: write   # open the PR

concurrency: cut-release   # never prep two releases at once

jobs:
  cut:
    name: Open a release PR
    runs-on: ubuntu-latest   # pure shell/git — the macOS build runs in release.yml on merge
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Compute next version
        id: v
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          cur=$(grep -E '^SKELF_VERSION=' build.sh | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')
          bld=$(grep -E '^SKELF_BUILD=' build.sh | sed -E 's/.*"([0-9]+)".*/\1/')
          IFS=. read -r MA MI PA <<< "$cur"
          case "$BUMP" in
            major) MA=$((MA+1)); MI=0; PA=0 ;;
            minor) MI=$((MI+1)); PA=0 ;;
            patch) PA=$((PA+1)) ;;
          esac
          {
            echo "next=$MA.$MI.$PA"
            echo "build=$((bld+1))"
            echo "date=$(date +%F)"
          } >> "$GITHUB_OUTPUT"

      - name: Bump version & promote changelog
        env:
          NEXT: ${{ steps.v.outputs.next }}
          BUILD: ${{ steps.v.outputs.build }}
          DATE: ${{ steps.v.outputs.date }}
          REPO: ${{ github.server_url }}/${{ github.repository }}
        run: |
          set -euo pipefail
          sed -i -E "s/^SKELF_VERSION=\"[0-9.]+\"/SKELF_VERSION=\"$NEXT\"/" build.sh
          sed -i -E "s/^SKELF_BUILD=\"[0-9]+\"/SKELF_BUILD=\"$BUILD\"/" build.sh
          # Turn the first "## [Unreleased]" into a fresh empty one + the new version heading; the
          # notes that were under Unreleased now sit under the new version.
          awk -v v="$NEXT" -v d="$DATE" '
            !done && /^## \[Unreleased\]/ { print; print ""; print "## [" v "] - " d; done=1; next }
            { print }
          ' CHANGELOG.md > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md
          # Footer links: repoint Unreleased at the new tag and add the new release link.
          sed -i -E "s#^\[Unreleased\]:.*#[Unreleased]: $REPO/compare/v$NEXT...HEAD\n[$NEXT]: $REPO/releases/tag/v$NEXT#" CHANGELOG.md

      - name: Open the release PR
        env:
          NEXT: ${{ steps.v.outputs.next }}
          BUILD: ${{ steps.v.outputs.build }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          branch="release-v$NEXT"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git commit -am "Release $NEXT"
          git push -u origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "Release $NEXT" \
            --body "Automated release prep for **$NEXT** (build $BUILD). Merging this PR tags \`v$NEXT\` and publishes the GitHub Release (handled by release.yml on merge)."
