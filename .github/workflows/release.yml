name: Release

# Builds Skelf.app, packages Skelf.dmg + SHA256SUMS, and publishes a GitHub Release with the
# matching CHANGELOG section as the notes. Two ways in, both zero-touch after the trigger:
#
#   • Merge a "Release X.Y.Z" PR (opened by cut-release.yml). The merge pushes to main; the
#     `resolve` job sees build.sh's version has no tag yet, tags it, and `publish` ships it.
#     Triggered by your merge (a push event), so it's never gated behind "action_required".
#   • Push a SemVer tag by hand (e.g. `git tag -a v1.0.0 -m … && git push origin v1.0.0`).
#
# Builds are UNSIGNED (ad-hoc) — no Developer ID / notarization. Users approve the app once via
# System Settings → Privacy & Security (see the README "Install").
#
# CAVEAT: scripts/make-dmg.sh lays the DMG window out with Finder/AppleScript, which can be
# flaky on a headless runner. If it breaks, build the DMG locally and upload it by hand.

on:
  push:
    tags: ['v*.*.*']
    branches: [main]

permissions:
  contents: write   # tag + create the GitHub Release

jobs:
  # Cheap gate (runs on every main push): release only when build.sh's version isn't tagged yet.
  resolve:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.r.outputs.publish }}
      tag: ${{ steps.r.outputs.tag }}
      version: ${{ steps.r.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ startsWith(github.ref, 'refs/tags/') && github.ref || 'main' }}
          fetch-depth: 0

      - name: Resolve & maybe tag
        id: r
        env:
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [[ "$REF" == refs/tags/* ]]; then
            tag="${REF#refs/tags/}"; version="${tag#v}"; publish=true   # hand-pushed tag
          else
            version=$(grep -E '^SKELF_VERSION=' build.sh | sed -E 's/.*"([0-9.]+)".*/\1/')
            tag="v$version"
            if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
              publish=false                                            # already released — skip
            else
              publish=true
              git config user.name  "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git tag -a "$tag" -m "Skelf $version"
              git push origin "refs/tags/$tag"   # GITHUB_TOKEN tag push won't re-trigger this
            fi
          fi
          {
            echo "publish=$publish"
            echo "tag=$tag"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

  publish:
    name: Build, package & publish
    needs: resolve
    if: needs.resolve.outputs.publish == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}   # build the exact tagged commit
          fetch-depth: 0

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build Skelf.app
        run: ./build.sh

      - name: Build DMG + checksum
        run: ./scripts/make-dmg.sh

      - name: Extract release notes from CHANGELOG
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" {f=1; next}
            f && /^## \[/ {exit}
            f {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then echo "Skelf $VERSION" > RELEASE_NOTES.md; fi

      - name: Publish GitHub Release
        # Pinned to v2 (current major). Bump when GitHub retires the Node 20 runtime.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: ${{ needs.resolve.outputs.tag }}
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          # SemVer pre-release tags carry a hyphen (e.g. v1.0.0-rc1) — mark those as a
          # prerelease so they don't become the repo's "Latest release".
          prerelease: ${{ contains(needs.resolve.outputs.tag, '-') }}
          files: |
            Skelf.dmg
            SHA256SUMS
