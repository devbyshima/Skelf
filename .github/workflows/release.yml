name: Release

# Builds Skelf.app, packages Skelf.dmg + SHA256SUMS, and publishes a GitHub Release with the
# matching CHANGELOG section as the notes. Two ways in:
#
#   • Merge a "Release X.Y.Z" PR (opened by cut-release.yml) — this job tags vX.Y.Z from
#     build.sh's version and publishes. This is the normal, PR-reviewed path.
#   • Push a SemVer tag by hand (e.g. `git tag -a v1.0.0 -m … && git push origin v1.0.0`).
#
# Builds are UNSIGNED (ad-hoc) — no Developer ID / notarization. Users approve the app once via
# System Settings → Privacy & Security (see the README "Install").
#
# CAVEAT: scripts/make-dmg.sh lays the DMG window out with Finder/AppleScript, which can be
# flaky on a headless runner. If it breaks, build the DMG locally and upload it by hand.

on:
  push:
    tags: ['v*.*.*']
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write   # tag + create the GitHub Release

jobs:
  release:
    name: Build, package & publish
    # Only for a hand-pushed tag, or a merged "release-*" PR (from cut-release.yml).
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'release-'))
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          # Tag push → build that tag; PR merge → build the merged main.
          ref: ${{ github.event_name == 'push' && github.ref || 'main' }}
          fetch-depth: 0

      - name: Resolve version & tag
        id: rel
        env:
          EVENT: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "push" ]; then
            tag="$REF_NAME"; version="${tag#v}"        # tag already exists
          else
            version=$(grep -E '^SKELF_VERSION=' build.sh | sed -E 's/.*"([0-9.]+)".*/\1/')
            tag="v$version"
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "Skelf $version"
            git push origin "refs/tags/$tag"           # GITHUB_TOKEN tag push won't re-trigger this
          fi
          {
            echo "tag=$tag"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build Skelf.app
        run: ./build.sh

      - name: Build DMG + checksum
        run: ./scripts/make-dmg.sh

      - name: Extract release notes from CHANGELOG
        env:
          VERSION: ${{ steps.rel.outputs.version }}
        run: |
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" {f=1; next}
            f && /^## \[/ {exit}
            f {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then echo "Skelf $VERSION" > RELEASE_NOTES.md; fi

      - name: Publish GitHub Release
        # Pinned to v2 (current major). Bump when GitHub retires the Node 20 runtime.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: ${{ steps.rel.outputs.tag }}
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          # SemVer pre-release tags carry a hyphen (e.g. v1.0.0-rc1) — mark those as a
          # prerelease so they don't become the repo's "Latest release".
          prerelease: ${{ contains(steps.rel.outputs.tag, '-') }}
          files: |
            Skelf.dmg
            SHA256SUMS
