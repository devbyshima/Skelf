name: Release

# Cut a release by pushing a SemVer tag, e.g.:
#   git tag -a v1.0.0 -m "Skelf 1.0.0" && git push origin v1.0.0
# This builds Skelf.app, packages Skelf.dmg + SHA256SUMS, and publishes a GitHub Release with
# the matching CHANGELOG section as the notes.
#
# Builds are UNSIGNED (ad-hoc) for now — there is no Developer ID / notarization step. Users
# approve the app once via System Settings → Privacy & Security (see the README "Install").
#
# CAVEAT: scripts/make-dmg.sh lays the DMG window out with Finder/AppleScript, which can be
# flaky on a headless CI runner. Test this workflow with a pre-release tag (e.g. v1.0.0-rc1)
# before relying on it — or build the DMG locally and upload it to the release by hand.

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  release:
    name: Build, package & publish
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build Skelf.app
        run: ./build.sh

      - name: Build DMG + checksum
        run: ./scripts/make-dmg.sh

      - name: Extract release notes from CHANGELOG
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" {f=1; next}
            f && /^## \[/ {exit}
            f {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then echo "Skelf $version" > RELEASE_NOTES.md; fi

      - name: Publish GitHub Release
        # Pinned to v2 (current major). Bump when GitHub retires the Node 20 runtime.
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          # SemVer pre-release tags carry a hyphen (e.g. v1.0.0-rc1) — mark those as a
          # prerelease so they don't become the repo's "Latest release".
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            Skelf.dmg
            SHA256SUMS
